---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install software-properties-common for PPA support
  ansible.builtin.apt:
    name: software-properties-common
    state: present

- name: Add ondrej/php PPA for PHP 8.4
  ansible.builtin.apt_repository:
    repo: ppa:ondrej/php
    state: present
    update_cache: true

- name: Install OpenCart runtime packages
  ansible.builtin.apt:
    name:
      - "{{ web_server }}"
      - "php{{ php_version }}"
      - "php{{ php_version }}-cli"
      - "php{{ php_version }}-mysql"
      - "php{{ php_version }}-curl"
      - "php{{ php_version }}-gd"
      - "php{{ php_version }}-zip"
      - "php{{ php_version }}-mbstring"
      - "php{{ php_version }}-xml"
      - "php{{ php_version }}-intl"
      - "php{{ php_version }}-bcmath"
      - "php{{ php_version }}-redis"
      - mysql-server
      - redis-server
      - unzip
      - curl
      - wget
      - rsync
      - composer
      - python3-pymysql
      - python3-passlib
    state: present

- name: Install PHP-FPM for nginx deployments
  ansible.builtin.apt:
    name: "php{{ php_version }}-fpm"
    state: present
  when: web_server == "nginx"
  notify: Restart php-fpm

- name: Install mod_php for Apache deployments
  ansible.builtin.apt:
    name: "libapache2-mod-php{{ php_version }}"
    state: present
  when: web_server == "apache2"

- name: Ensure web server service is started
  ansible.builtin.systemd:
    name: "{{ web_server }}"
    state: started
    enabled: true

- name: Ensure PHP-FPM service is started
  ansible.builtin.systemd:
    name: "php{{ php_version }}-fpm"
    state: started
    enabled: true
  when: web_server == "nginx"

- name: Ensure database and cache services are started
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - mysql
    - redis-server
  failed_when: false

- name: Tune PHP FPM ini values
  ansible.builtin.ini_file:
    path: "/etc/php/{{ php_version }}/fpm/php.ini"
    section: PHP
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    mode: "0644"
  loop: "{{ php_ini_values | dict2items }}"
  notify: Restart php-fpm
  when: web_server == "nginx"

- name: Tune PHP Apache ini values
  ansible.builtin.ini_file:
    path: "/etc/php/{{ php_version }}/apache2/php.ini"
    section: PHP
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    mode: "0644"
  loop: "{{ php_ini_values | dict2items }}"
  when: web_server == "apache2"

- name: Tune PHP CLI ini values
  ansible.builtin.ini_file:
    path: "/etc/php/{{ php_version }}/cli/php.ini"
    section: PHP
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    mode: "0644"
  loop: "{{ php_ini_values | dict2items }}"

---
- name: Download official OpenCart archive
  ansible.builtin.get_url:
    url: "{{ opencart_download_url }}"
    dest: "{{ opencart_archive_path }}"
    mode: "0644"

- name: Unpack OpenCart archive
  ansible.builtin.unarchive:
    src: "{{ opencart_archive_path }}"
    dest: "{{ opencart_tmp_dir }}"
    remote_src: true
    creates: "{{ opencart_tmp_dir }}/upload"

- name: Check whether OpenCart is already present
  ansible.builtin.stat:
    path: "{{ site_root }}/index.php"
  register: opencart_index

- name: Copy OpenCart upload directory into site root
  ansible.builtin.copy:
    src: "{{ opencart_tmp_dir }}/upload/"
    dest: "{{ site_root }}/"
    remote_src: true
    owner: "{{ site_owner }}"
    group: "{{ site_group }}"
    directory_mode: "0755"
    mode: preserve
  when: not opencart_index.stat.exists

- name: Create config.php from config-dist.php if absent
  ansible.builtin.copy:
    src: "{{ site_root }}/config-dist.php"
    dest: "{{ site_root }}/config.php"
    remote_src: true
    owner: "{{ site_owner }}"
    group: "{{ site_group }}"
    mode: "0644"
    force: false
  when: not opencart_index.stat.exists

- name: Create admin/config.php from admin/config-dist.php if absent
  ansible.builtin.copy:
    src: "{{ site_root }}/admin/config-dist.php"
    dest: "{{ site_root }}/admin/config.php"
    remote_src: true
    owner: "{{ site_owner }}"
    group: "{{ site_group }}"
    mode: "0644"
    force: false
  when: not opencart_index.stat.exists

- name: Check OpenCart source composer.json
  ansible.builtin.stat:
    path: "{{ opencart_tmp_dir }}/composer.json"
  register: opencart_source_composer_json

- name: Copy OpenCart composer.json into site root
  ansible.builtin.copy:
    src: "{{ opencart_tmp_dir }}/composer.json"
    dest: "{{ site_root }}/composer.json"
    remote_src: true
    owner: "{{ site_owner }}"
    group: "{{ site_group }}"
    mode: "0644"
  when: opencart_source_composer_json.stat.exists

- name: Check OpenCart source composer.lock
  ansible.builtin.stat:
    path: "{{ opencart_tmp_dir }}/composer.lock"
  register: opencart_source_composer_lock

- name: Copy OpenCart composer.lock into site root
  ansible.builtin.copy:
    src: "{{ opencart_tmp_dir }}/composer.lock"
    dest: "{{ site_root }}/composer.lock"
    remote_src: true
    owner: "{{ site_owner }}"
    group: "{{ site_group }}"
    mode: "0644"
  when: opencart_source_composer_lock.stat.exists

- name: Point Composer vendor-dir at installed OpenCart storage directory
  ansible.builtin.replace:
    path: "{{ site_root }}/composer.json"
    regexp: '"vendor-dir"\\s*:\\s*"\\./upload/system/storage/vendor/"'
    replace: '"vendor-dir": "./system/storage/vendor/"'
  when: opencart_source_composer_json.stat.exists

- name: Check OpenCart composer.json
  ansible.builtin.stat:
    path: "{{ site_root }}/composer.json"
  register: opencart_composer_json

- name: Install OpenCart Composer dependencies
  ansible.builtin.command:
    cmd: composer install --no-dev --no-interaction --optimize-autoloader
    chdir: "{{ site_root }}"
  environment:
    COMPOSER_ALLOW_SUPERUSER: "1"
  register: opencart_composer_install
  changed_when: "'Nothing to install' not in opencart_composer_install.stdout"
  when: opencart_composer_json.stat.exists

- name: Verify Composer autoload exists
  ansible.builtin.stat:
    path: "{{ storage_dir }}/vendor/autoload.php"
  register: opencart_vendor_autoload
  when: opencart_composer_json.stat.exists

- name: Assert Composer dependencies are installed
  ansible.builtin.assert:
    that:
      - opencart_vendor_autoload.stat.exists
    fail_msg: "OpenCart composer.json exists, but {{ storage_dir }}/vendor/autoload.php was not created. Check Composer output and network access."
  when: opencart_composer_json.stat.exists

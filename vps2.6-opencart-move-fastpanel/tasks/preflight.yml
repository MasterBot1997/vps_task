---
- name: Assert target OS is Ubuntu
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
      - ansible_distribution_major_version | int >= 24
    fail_msg: "This playbook is intended for Ubuntu Server only."

- name: Assert deployment domain was passed at runtime
  ansible.builtin.assert:
    that:
      - site_domain is defined
      - site_domain | length > 0
      - site_domain != "example.com"
    fail_msg: "Pass the target domain explicitly: ansible-playbook -i inventory.ini vps2.6-opencart-move-fastpanel.yml -e site_domain=shop.example.com"

- name: Assert site_root is safe
  ansible.builtin.assert:
    that:
      - site_root is defined
      - site_root | length > 8
      - site_root != "/var/www/"
    fail_msg: "site_root resolved to an unsafe value. Check site_domain/site_root variables."

- name: Assert this playbook manages a plain nginx source server
  ansible.builtin.assert:
    that:
      - web_server == "nginx"
      - manage_vhost | bool
    fail_msg: "This source-site playbook expects web_server=nginx and manage_vhost=true."

- name: Check web server package state
  ansible.builtin.package_facts:
    manager: auto

- name: Show detected web stack
  ansible.builtin.debug:
    msg:
      - "nginx installed={{ 'nginx' in ansible_facts.packages }}"
      - "mysql installed={{ 'mysql-server' in ansible_facts.packages }}"
      - "mariadb installed={{ 'mariadb-server' in ansible_facts.packages }}"

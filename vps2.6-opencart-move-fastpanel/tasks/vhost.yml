---
- name: Enable Apache mod_rewrite
  community.general.apache2_module:
    name: rewrite
    state: present
  notify: Reload apache2

- name: Install managed Apache vhost
  ansible.builtin.template:
    src: apache-opencart.conf.j2
    dest: "/etc/apache2/sites-available/{{ site_domain }}.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Reload apache2

- name: Enable managed Apache vhost
  ansible.builtin.command:
    cmd: "a2ensite {{ site_domain }}.conf"
    creates: "/etc/apache2/sites-enabled/{{ site_domain }}.conf"
  notify: Reload apache2

- name: Disable default Apache vhost
  ansible.builtin.command:
    cmd: a2dissite 000-default.conf
    removes: /etc/apache2/sites-enabled/000-default.conf
  notify: Reload apache2

- name: Validate Apache configuration
  ansible.builtin.command: apache2ctl configtest
  changed_when: false

- name: Ensure Apache is enabled and started
  ansible.builtin.systemd:
    name: apache2
    state: started
    enabled: true

---
- name: Install managed nginx vhost
  ansible.builtin.template:
    src: nginx-opencart.conf.j2
    dest: "/etc/nginx/sites-available/{{ site_domain }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable managed nginx vhost
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ site_domain }}"
    dest: "/etc/nginx/sites-enabled/{{ site_domain }}"
    state: link
  notify: Reload nginx

- name: Disable default nginx vhost
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Ensure nginx is enabled and started
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

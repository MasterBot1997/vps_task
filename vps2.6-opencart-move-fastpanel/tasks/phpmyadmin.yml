---
- name: Create phpMyAdmin temp directory
  ansible.builtin.file:
    path: "{{ phpmyadmin_tmp_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0750"

- name: Create phpMyAdmin install directory
  ansible.builtin.file:
    path: "{{ phpmyadmin_dir }}"
    state: directory
    owner: root
    group: www-data
    mode: "0755"

- name: Download phpMyAdmin archive
  ansible.builtin.get_url:
    url: "{{ phpmyadmin_download_url }}"
    dest: "/tmp/phpmyadmin-{{ phpmyadmin_version }}.zip"
    mode: "0644"

- name: Unpack phpMyAdmin archive to temp location
  ansible.builtin.unarchive:
    src: "/tmp/phpmyadmin-{{ phpmyadmin_version }}.zip"
    dest: "/tmp/"
    remote_src: true
    creates: "/tmp/phpMyAdmin-{{ phpmyadmin_version }}-all-languages/index.php"

- name: Check if phpMyAdmin is already installed
  ansible.builtin.stat:
    path: "{{ phpmyadmin_dir }}/index.php"
  register: pma_index

- name: Copy phpMyAdmin files to install directory
  ansible.builtin.copy:
    src: "/tmp/phpMyAdmin-{{ phpmyadmin_version }}-all-languages/"
    dest: "{{ phpmyadmin_dir }}/"
    remote_src: true
    owner: root
    group: www-data
    directory_mode: "0755"
    mode: preserve
  when: not pma_index.stat.exists

- name: Render phpMyAdmin config
  ansible.builtin.template:
    src: phpmyadmin-config.inc.php.j2
    dest: "{{ phpmyadmin_dir }}/config.inc.php"
    owner: root
    group: www-data
    mode: "0640"

- name: Install phpMyAdmin Apache vhost
  ansible.builtin.template:
    src: apache-phpmyadmin.conf.j2
    dest: /etc/apache2/sites-available/phpmyadmin.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload apache2

- name: Enable phpMyAdmin Apache vhost
  ansible.builtin.command:
    cmd: a2ensite phpmyadmin.conf
    creates: /etc/apache2/sites-enabled/phpmyadmin.conf
  notify: Reload apache2
